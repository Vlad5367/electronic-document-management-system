{% extends 'base.html' %}
{% block content %}

<h1>Загрузка документа</h1>

<div class="card">
    <form method="post" enctype="multipart/form-data">

        <input type="text"
               name="title"
               placeholder="Название документа"
               required>

        <input type="file"
               name="file"
               required>

        <button class="btn" type="submit">Загрузить</button>
    </form>
</div>

{% endblock %}
